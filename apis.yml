aid: bayou-energy
url: https://raw.githubusercontent.com/api-evangelist/bayou-energy/refs/heads/main/apis.yml
name: Bayou Energy
kind: company
description: Bayou Energy provides a utility-bill and usage-data API that lets companies
  collect their customers' utility account, bill, and interval meter data from US
  utilities. Customers link their utility credentials through a hosted onboarding
  flow, and Bayou continuously fetches the full bill and interval history, exposing
  it through a REST API secured with HTTP Basic authentication.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Utility Data
- Energy
- Utility Bills
- Interval Data
- Metering
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
