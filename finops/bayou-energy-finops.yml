description: >-
  FinOps view of Bayou Energy spend. Bayou bills usage-based per unlocked meter
  at $2 per meter per utility bill, with the first ten unique meters free. Cost
  is driven by the number of meters whose data you unlock and how many bills are
  produced for those meters; a sandbox utility lets you develop without
  incurring charges.
notes: >-
  Per-meter rate and free-meter allowance are subject to change; verify against
  the Bayou pricing overview during reconciliation.
sources:
- https://docs.bayou.energy/docs/pricing-overview
