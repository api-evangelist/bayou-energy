meters:
- name: meter_unlocks
  description: Unique meters unlocked for data access; first ten are free, then billed.
  unit: meters
  aggregation: sum
  dimensions:
  - account
  - customer
  - utility
- name: meter_bills
  description: Meter-bill combinations billed at $2 per meter per utility bill after the free allowance.
  unit: meter_bills
  aggregation: sum
  dimensions:
  - account
  - customer
  - utility
  - meter
principles:
- name: Visibility
  description: Review monthly Bayou invoices and the detailed per-meter breakdown sent in the first seven days of each month.
- name: Allocation
  description: Tag customers and meters per workload/team; map unlocked meters to internal cost centers.
- name: Optimization
  description: Develop against the sandbox utility (speculoos_power); unlock only the meters you need, and unlock bills selectively to avoid charging unused meters.
- name: Accountability
  description: Track meter unlocks against budget; only the first ten meters are free, so monitor when usage-based billing activates.
